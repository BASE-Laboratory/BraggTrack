name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install package (no deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . --no-deps

      - name: Run pre-PR conflict/sync diagnostics
        run: python scripts/pre_pr_check.py

      - name: Run CI report (tests + acceptance + smoke)
        run: python scripts/ci_report.py
